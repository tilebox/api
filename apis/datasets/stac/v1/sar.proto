// This file models STAC SAR 1.3.2 metadata for Tilebox assets and generated dataset fields. Deprecated product types are
// normalized to the Product extension, while instrument_mode remains available for source compatibility.
// https://github.com/stac-extensions/sar/blob/v1.3.2/README.md

edition = "2023";
package datasets.stac.v1;

import "buf/validate/validate.proto";

option features.field_presence = IMPLICIT;

// SARFrequencyBand contains the closed SAR 1.3.2 sar:frequency_band vocabulary.
enum SARFrequencyBand {
  SAR_FREQUENCY_BAND_UNSPECIFIED = 0;
  SAR_FREQUENCY_BAND_P = 1;
  SAR_FREQUENCY_BAND_L = 2;
  SAR_FREQUENCY_BAND_S = 3;
  SAR_FREQUENCY_BAND_C = 4;
  SAR_FREQUENCY_BAND_X = 5;
  SAR_FREQUENCY_BAND_KU = 6;
  SAR_FREQUENCY_BAND_K = 7;
  SAR_FREQUENCY_BAND_KA = 8;
}

// SARPolarization contains the closed SAR 1.3.2 sar:polarizations element vocabulary.
enum SARPolarization {
  SAR_POLARIZATION_UNSPECIFIED = 0;
  SAR_POLARIZATION_HH = 1;
  SAR_POLARIZATION_VV = 2;
  SAR_POLARIZATION_HV = 3;
  SAR_POLARIZATION_VH = 4;
  SAR_POLARIZATION_LH = 5;
  SAR_POLARIZATION_LV = 6;
  SAR_POLARIZATION_RH = 7;
  SAR_POLARIZATION_RV = 8;
  SAR_POLARIZATION_CH = 9;
  SAR_POLARIZATION_CV = 10;
}

// SARObservationDirection contains the closed SAR 1.3.2 sar:observation_direction vocabulary.
enum SARObservationDirection {
  SAR_OBSERVATION_DIRECTION_UNSPECIFIED = 0;
  SAR_OBSERVATION_DIRECTION_LEFT = 1;
  SAR_OBSERVATION_DIRECTION_RIGHT = 2;
}

// SARProperties contains the SAR 1.3.2 fields for an Asset. Item-property fields remain flattened in generated dataset
// schemas and may reuse these enum types. Deprecated sar:product_type is normalized to Product 1.0.
message SARProperties {
  repeated SARPolarization polarizations = 1 [(buf.validate.field).repeated.items.enum = {
    defined_only: true
    not_in: [0]
  }];
  // Open provider- and mission-specific vocabulary. Deprecated by SAR 1.3.2 but retained for source compatibility.
  string instrument_mode = 2 [
    features.field_presence = EXPLICIT,
    (buf.validate.field).string.min_len = 1
  ];
  SARFrequencyBand frequency_band = 3 [(buf.validate.field).enum.defined_only = true];
  // Center frequency in gigahertz.
  double center_frequency = 4 [
    features.field_presence = EXPLICIT,
    (buf.validate.field).double.gt = 0
  ];
  // Range bandwidth in gigahertz.
  double bandwidth = 5 [
    features.field_presence = EXPLICIT,
    (buf.validate.field).double.gt = 0
  ];
  // Resolution and pixel spacing values are in metres.
  double resolution_range = 6 [
    features.field_presence = EXPLICIT,
    (buf.validate.field).double.gte = 0
  ];
  double resolution_azimuth = 7 [
    features.field_presence = EXPLICIT,
    (buf.validate.field).double.gte = 0
  ];
  double pixel_spacing_range = 8 [
    features.field_presence = EXPLICIT,
    (buf.validate.field).double.gte = 0
  ];
  double pixel_spacing_azimuth = 9 [
    features.field_presence = EXPLICIT,
    (buf.validate.field).double.gte = 0
  ];
  uint64 looks_range = 10 [features.field_presence = EXPLICIT];
  uint64 looks_azimuth = 11 [features.field_presence = EXPLICIT];
  double looks_equivalent_number = 12 [
    features.field_presence = EXPLICIT,
    (buf.validate.field).double.gte = 0
  ];
  SARObservationDirection observation_direction = 13 [(buf.validate.field).enum.defined_only = true];
  uint64 relative_burst = 14 [
    features.field_presence = EXPLICIT,
    (buf.validate.field).uint64.gte = 1
  ];
  repeated string beam_ids = 15;
}
