// The externally facing API allowing users to interact with workflows.

edition = "2023";

package workflows.v1;

import "buf/validate/validate.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "tilebox/v1/id.proto";
import "workflows/v1/core.proto";

option features.field_presence = IMPLICIT;

// A cluster is a grouping of tasks that are related.
message Cluster {
  // 1 is reserved for a potential id field in the future.
  reserved 1;
  // The unique slug of the cluster within the namespace.
  string slug = 2;
  // The display name of the cluster.
  string display_name = 3;
  // A description for the cluster.
  string description = 6;
  // Where the cluster is deletable
  bool deletable = 4;
  // The workflows that are currently deployed to this cluster. Each workflow will only contain one release,
  // which is the currently deployed release for that workflow on this cluster.
  repeated Workflow deployed_releases = 5;
}

// CreateClusterRequest creates a new cluster.
message CreateClusterRequest {
  // The name of the cluster.
  string name = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 100
  ];
  // A description for the cluster.
  string description = 2 [(buf.validate.field).string.max_len = 50000];
  // An optional cluster slug. If not set, a slug derived from the name will automatically be generated.
  string slug = 3;
}

// GetClusterRequest requests details for a cluster.
message GetClusterRequest {
  // The slug of the cluster to get details for. Empty string requests the default cluster.
  string cluster_slug = 1;
}

// UpdateClusterRequest updates an existing cluster, by updating all fields that are set to their new values.
// If a field is not set, it will not be updated.
message UpdateClusterRequest {
  string cluster_slug = 1 [(buf.validate.field).string.min_len = 1];
  string name = 2 [
    features.field_presence = EXPLICIT,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 100
  ];
  string description = 3 [features.field_presence = EXPLICIT];
}

// DeleteClusterRequest deletes an existing cluster.
message DeleteClusterRequest {
  // The slug of the cluster to delete.
  string cluster_slug = 1 [(buf.validate.field).string.min_len = 1];
}

// DeleteClusterResponse is the response to DeleteClusterRequest.
message DeleteClusterResponse {}

// ListClustersRequest lists all clusters.
message ListClustersRequest {}

// ListClustersResponse is the response to ListClustersRequest.
message ListClustersResponse {
  // The clusters.
  repeated Cluster clusters = 1;
}

// GetWorkflowRequest requests details for a workflow.
message GetWorkflowRequest {
  // The slug of the workflow to get details for.
  string workflow_slug = 1 [(buf.validate.field).string.min_len = 1];
}

// DeleteWorkflowRequest deletes an existing workflow.
message DeleteWorkflowRequest {
  // The slug of the workflow to delete.
  string workflow_slug = 1 [(buf.validate.field).string.min_len = 1];
}

// DeleteWorkflowResponse is the response to DeleteWorkflowRequest.
message DeleteWorkflowResponse {}

// PublishWorkflowReleaseRequest publishes a new workflow release artifact, and associates it with a workflow.
message PublishWorkflowReleaseRequest {
  string workflow_slug = 1 [(buf.validate.field).string.min_len = 1];
  tilebox.v1.ID artifact_id = 2 [(buf.validate.field).required = true];
  ReleaseContent content = 3 [(buf.validate.field).required = true];
}

// UnpublishWorkflowReleaseRequest unpublishes a specific workflow release.
message UnpublishWorkflowReleaseRequest {
  // The slug of the workflow containing the release to unpublish.
  string workflow_slug = 1 [(buf.validate.field).string.min_len = 1];
  // The ID of the release to unpublish.
  tilebox.v1.ID release_id = 2 [(buf.validate.field).required = true];
}

// UnpublishWorkflowReleaseResponse is the response to UnpublishWorkflowReleaseRequest.
message UnpublishWorkflowReleaseResponse {}

// ListWorkflowsRequest lists all workflows.
message ListWorkflowsRequest {}

// ListWorkflowsResponse is the response to ListWorkflowsRequest.
message ListWorkflowsResponse {
  repeated Workflow workflows = 1;
}

// CreateWorkflowRequest creates a new workflow, with a name and an optional description.
// A workflow slug will be generated based on the name.
message CreateWorkflowRequest {
  string name = 1 [(buf.validate.field).string.min_len = 1];
  string description = 2;
}

// Workflow represents a logical grouping for a set of tasks. It can have multiple releases, each comprising a different
// set of tasks.
message Workflow {
  reserved 1; // reserved for workflow ID, which is currently not exposed in the API but may be added in the future.
  string slug = 2;
  string name = 3;
  string description = 4;
  repeated WorkflowRelease releases = 5;
}

// WorkflowRelease represents an immutable release of a workflow, which includes a set of tasks and an artifact.
message WorkflowRelease {
  tilebox.v1.ID id = 1;
  Artifact artifact = 2;
  ReleaseContent content = 3;
  google.protobuf.Timestamp created_at = 4;
  repeated Cluster clusters = 5; // List of clusters that the workflow is published to
}

// Artifact represents the artifact associated with a workflow release,
// which is the file that contains the code and dependencies needed to execute the tasks in the release.
message Artifact {
  tilebox.v1.ID id = 1;
  string digest = 2 [(buf.validate.field).string.pattern = "^[a-f0-9]{64}$"];
}

// ReleaseContent represents the content of a workflow release, which is the set of files that are included,
// the list of task identifiers, and the command to start a worker runtime for executing the tasks in the release.
// The fingerprint is a hash of the release content.
message ReleaseContent {
  // A fingerprint of the release content, which is a hash of the task identifiers, files, runner object path,
  // and command override. Used to determine if two releases have the same content, for idempotent builds.
  string fingerprint = 1 [(buf.validate.field).string.pattern = "^[a-f0-9]{64}$"];
  // List of task identifiers included in the release artifact.
  repeated TaskIdentifier tasks = 2 [(buf.validate.field).repeated.min_items = 1];
  // List of files/directories included in the release artifact.
  repeated Path files = 3;
  // The python module/object path to the runner instance, e.g. "my_module.my_runner:runner".
  string runner_object_path = 4;
  // A custom command override for starting a worker runtime. This is optional, and if not set defaults to
  // "uv run python -m tilebox.workflows.runner <runner_object_path>". This allows users to specify a custom command
  // for starting the worker runtime, e.g. to set environment variables or use a different entrypoint.
  repeated string command_override = 5;
}

// Path represents a file or directory path in the release content. If it is a directory, it can have child paths.
message Path {
  string path = 1;
  bool directory = 2;
  repeated Path children = 3;
}

// DeployWorkflowReleaseRequest deploys a workflow release to a set of clusters, making the tasks available for
// execution on those clusters.
message DeployWorkflowReleaseRequest {
  string workflow_slug = 1 [(buf.validate.field).string.min_len = 1];
  tilebox.v1.ID release_id = 2;
  repeated string cluster_slugs = 3 [
    (buf.validate.field).repeated.min_items = 0,
    (buf.validate.field).repeated.items.string.min_bytes = 1
  ];
}

// DeployWorkflowReleaseResponse is the response to DeployWorkflowReleaseRequest,
// containing the deployed release and the new state of all the clusters it was deployed to.
message DeployWorkflowReleaseResponse {
  WorkflowRelease release = 1;
  repeated Cluster clusters = 2;
}

// UndeployWorkflowReleaseRequest undeploys a workflow release from a set of clusters, making them no longer available
// for execution on those clusters.
message UndeployWorkflowReleaseRequest {
  string workflow_slug = 1 [(buf.validate.field).string.min_len = 1];
  tilebox.v1.ID release_id = 2;
  repeated string cluster_slugs = 3 [
    (buf.validate.field).repeated.min_items = 1,
    (buf.validate.field).repeated.items.string.min_bytes = 1
  ];
}

// UndeployWorkflowReleaseResponse is the response to UndeployWorkflowReleaseRequest,
// containing the undeployed release and the new state of all the clusters it was undeployed from.
message UndeployWorkflowReleaseResponse {
  WorkflowRelease release = 1;
  repeated Cluster clusters = 2;
}

// A service for managing workflows.
service WorkflowsService {
  rpc CreateCluster(CreateClusterRequest) returns (Cluster);
  rpc GetCluster(GetClusterRequest) returns (Cluster);
  rpc UpdateCluster(UpdateClusterRequest) returns (Cluster);
  rpc DeleteCluster(DeleteClusterRequest) returns (DeleteClusterResponse);
  rpc ListClusters(ListClustersRequest) returns (ListClustersResponse);

  rpc CreateWorkflow(CreateWorkflowRequest) returns (Workflow);
  rpc ListWorkflows(ListWorkflowsRequest) returns (ListWorkflowsResponse);
  rpc GetWorkflow(GetWorkflowRequest) returns (Workflow);
  rpc DeleteWorkflow(DeleteWorkflowRequest) returns (DeleteWorkflowResponse);
  rpc PublishWorkflowRelease(PublishWorkflowReleaseRequest) returns (WorkflowRelease);
  rpc UnpublishWorkflowRelease(UnpublishWorkflowReleaseRequest) returns (UnpublishWorkflowReleaseResponse);

  rpc DeployWorkflowRelease(DeployWorkflowReleaseRequest) returns (DeployWorkflowReleaseResponse);
  rpc UndeployWorkflowRelease(UndeployWorkflowReleaseRequest) returns (UndeployWorkflowReleaseResponse);
}
